<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320">
  <rect x="0" y="0" width="680" height="320" rx="8" ry="8" fill="#ffffff"/>
  <rect x="0" y="0" width="680" height="32" rx="8" ry="8" fill="#f6f8fa"/>
  <rect x="0" y="20" width="680" height="12" fill="#f6f8fa"/>
  <rect x="0" y="32" width="680" height="1" fill="#d8dee4"/>

  <circle cx="20" cy="16" r="5" fill="#d0d7de"/>
  <circle cx="36" cy="16" r="5" fill="#d0d7de"/>
  <circle cx="52" cy="16" r="5" fill="#d0d7de"/>

  <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13">

    <text x="28" y="62">
      <tspan fill="#57606a">~$</tspan>
      <tspan fill="#24292f"> stats</tspan>
    </text>

    <text x="28" y="90" fill="#d8dee4">────────────────────────────────────────</text>

    <text x="28" y="116">
      <tspan fill="#57606a">age</tspan>
      <tspan id="age_data_dots" fill="#d8dee4"></tspan>
      <tspan id="age_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="142">
      <tspan fill="#57606a">commits</tspan>
      <tspan id="commit_data_dots" fill="#d8dee4"></tspan>
      <tspan id="commit_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="168">
      <tspan fill="#57606a">stars</tspan>
      <tspan id="star_data_dots" fill="#d8dee4"></tspan>
      <tspan id="star_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="194">
      <tspan fill="#57606a">repos</tspan>
      <tspan id="repo_data_dots" fill="#d8dee4"></tspan>
      <tspan id="repo_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="220">
      <tspan fill="#57606a">contributed</tspan>
      <tspan id="contrib_data_dots" fill="#d8dee4"></tspan>
      <tspan id="contrib_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="246">
      <tspan fill="#57606a">followers</tspan>
      <tspan id="follower_data_dots" fill="#d8dee4"></tspan>
      <tspan id="follower_data" fill="#24292f"></tspan>
    </text>

    <text x="28" y="272" fill="#d8dee4">────────────────────────────────────────</text>

    <text x="28" y="298">
      <tspan fill="#1a7f37">++</tspan>
      <tspan id="loc_add_dots" fill="#d8dee4"></tspan>
      <tspan id="loc_add" fill="#1a7f37"></tspan>
      <tspan fill="#d8dee4">  </tspan>
      <tspan fill="#cf222e">--</tspan>
      <tspan id="loc_del_dots" fill="#d8dee4"></tspan>
      <tspan id="loc_del" fill="#cf222e"></tspan>
      <tspan fill="#d8dee4">  </tspan>
      <tspan fill="#57606a">net</tspan>
      <tspan id="loc_data_dots" fill="#d8dee4"></tspan>
      <tspan id="loc_data" fill="#24292f"></tspan>
    </text>

  </g>
</svg>
