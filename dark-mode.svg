<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320">
  <rect x="0" y="0" width="680" height="320" rx="8" ry="8" fill="#0d1117"/>
  <rect x="0" y="0" width="680" height="32" rx="8" ry="8" fill="#161b22"/>
  <rect x="0" y="20" width="680" height="12" fill="#161b22"/>

  <circle cx="20" cy="16" r="5" fill="#484f58"/>
  <circle cx="36" cy="16" r="5" fill="#484f58"/>
  <circle cx="52" cy="16" r="5" fill="#484f58"/>

  <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13">

    <text x="28" y="62">
      <tspan fill="#6e7681">~$</tspan>
      <tspan fill="#c9d1d9"> stats</tspan>
    </text>

    <text x="28" y="90" fill="#21262d">────────────────────────────────────────</text>

    <text x="28" y="116">
      <tspan fill="#6e7681">age</tspan>
      <tspan id="age_data_dots" fill="#21262d"></tspan>
      <tspan id="age_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="142">
      <tspan fill="#6e7681">commits</tspan>
      <tspan id="commit_data_dots" fill="#21262d"></tspan>
      <tspan id="commit_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="168">
      <tspan fill="#6e7681">stars</tspan>
      <tspan id="star_data_dots" fill="#21262d"></tspan>
      <tspan id="star_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="194">
      <tspan fill="#6e7681">repos</tspan>
      <tspan id="repo_data_dots" fill="#21262d"></tspan>
      <tspan id="repo_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="220">
      <tspan fill="#6e7681">contributed</tspan>
      <tspan id="contrib_data_dots" fill="#21262d"></tspan>
      <tspan id="contrib_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="246">
      <tspan fill="#6e7681">followers</tspan>
      <tspan id="follower_data_dots" fill="#21262d"></tspan>
      <tspan id="follower_data" fill="#c9d1d9"></tspan>
    </text>

    <text x="28" y="272" fill="#21262d">────────────────────────────────────────</text>

    <text x="28" y="298">
      <tspan fill="#3fb950">++</tspan>
      <tspan id="loc_add_dots" fill="#21262d"></tspan>
      <tspan id="loc_add" fill="#3fb950"></tspan>
      <tspan fill="#21262d">  </tspan>
      <tspan fill="#f85149">--</tspan>
      <tspan id="loc_del_dots" fill="#21262d"></tspan>
      <tspan id="loc_del" fill="#f85149"></tspan>
      <tspan fill="#21262d">  </tspan>
      <tspan fill="#6e7681">net</tspan>
      <tspan id="loc_data_dots" fill="#21262d"></tspan>
      <tspan id="loc_data" fill="#c9d1d9"></tspan>
